# rules.conf
# ── Float + Taille + Centre ───────────────────────────────
windowrule = match:class ^(pavucontrol)$,          float on, center on, size 800 600
windowrule = match:class ^(blueman-manager)$,      float on, center on, size 900 650
windowrule = match:class ^(waypaper)$,             float on, center on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(file-roller)$,          float on
windowrule = match:title ^(Picture-in-Picture)$,   float on
# ── Opacité ──────────────────────────────────────────────
windowrule = match:class ^(kitty)$,   opacity 0.92 override 0.82 override
windowrule = match:class ^(firefox)$, opacity 1.0 override 1.0 override
# ── Workspaces ───────────────────────────────────────────
windowrule = match:class ^(firefox)$, workspace 2
windowrule = match:class ^(discord)$, workspace 3
windowrule = match:class ^(spotify)$, workspace 4  # ← vérifier la classe Spotify
# ── Fix NVIDIA tearing ───────────────────────────────────
windowrule = match:class ^(steam_app_.*)$, immediate on
# ── Workspaces persistants ───────────────────────────────
workspace = 1,  persistent:true
workspace = 2,  persistent:true
workspace = 3,  persistent:true
workspace = 4,  persistent:true
workspace = 5,  persistent:true
workspace = 6,  persistent:true
workspace = 7,  persistent:true
workspace = 8,  persistent:true
workspace = 9,  persistent:true
workspace = 10, persistent:true
