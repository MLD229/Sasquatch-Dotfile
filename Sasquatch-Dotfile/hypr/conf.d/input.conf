# input.conf
input {
    kb_layout = fr
    kb_variant = azerty
    kb_options = caps:escape    # Caps Lock → Escape (optionnel, pratique)

    follow_mouse = 1
    sensitivity = 0.0           # -1.0 à 1.0, 0 = neutre
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
}
