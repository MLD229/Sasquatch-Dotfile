# keybinds.conf
$mod = SUPER

# ── Essentiels ───────────────────────────────
bind = $mod, T,    exec, kitty
bind = SUPER, B, exec, pkill blueman-manager || blueman-manager
bind = $mod, E,         exec, dolphin
bindr = $mod, Y, exec, pkill waypaper || waypaper
bind = $mod, w,         exec, brave
bindr = SUPER, SUPER_L, exec, pkill rofi || rofi -show drun
bind = $mod, L,         exec, hyprlock
bind = $mod, Q,         killactive
bind = $mod SHIFT, M,   exit

# ── Fenêtres ─────────────────────────────────
bind = $mod, F,         fullscreen
bind = $mod, V,         togglefloating
bind = $mod, P,         pseudo
bind = $mod, J,         togglesplit

# ── Focus (ZQSD azerty) ──────────────────────
bind = $mod, Z,         movefocus, u
bind = $mod, S,         movefocus, d
bind = $mod, Q,         movefocus, l
bind = $mod, D,         fullscreen, 1

# ── Move fenêtre ─────────────────────────────
bind = $mod SHIFT, Z,   movewindow, u
bind = $mod SHIFT, S,   movewindow, d
bind = $mod SHIFT, Q,   movewindow, l
bind = $mod SHIFT, D,   movewindow, r

# ── Workspaces ───────────────────────────────
bind = $mod, ampersand,  workspace, 1
bind = $mod, eacute,     workspace, 2
bind = $mod, quotedbl,   workspace, 3
bind = $mod, apostrophe, workspace, 4
bind = $mod, parenleft,  workspace, 5

bind = $mod SHIFT, ampersand,  movetoworkspace, 1
bind = $mod SHIFT, eacute,     movetoworkspace, 2
bind = $mod SHIFT, quotedbl,   movetoworkspace, 3
bind = $mod SHIFT, apostrophe, movetoworkspace, 4
bind = $mod SHIFT, parenleft,  movetoworkspace, 5

# ── Scroll workspaces ────────────────────────
# ✅ Séquentiel + bloqué entre 1 et 10
bind = SUPER, mouse_down, workspace, r-1
bind = SUPER, mouse_up,   workspace, r+1
# ── Resize ───────────────────────────────────
binde = $mod CTRL, D, resizeactive,  30 0
binde = $mod CTRL, Q, resizeactive, -30 0
binde = $mod CTRL, Z, resizeactive,  0 -30
binde = $mod CTRL, S, resizeactive,  0  30

# ── Média / Son ──────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, ~/.config/hypr/../scripts/volume.sh up
bindel = , XF86AudioLowerVolume,  exec, ~/.config/hypr/../scripts/volume.sh down
bindl  = , XF86AudioMute,         exec, ~/.config/hypr/../scripts/volume.sh mute
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl prev

# ── Luminosité ───────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, ~/.config/scripts/brightness.sh up
bindel = , XF86MonBrightnessDown, exec, ~/.config/scripts/brightness.sh down

# ── Screenshot ───────────────────────────────
bind = ,      Print, exec, ~/.config/scripts/screenshot.sh full
bind = $mod,  Print, exec, ~/.config/scripts/screenshot.sh area

# ── Move/resize souris ───────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
