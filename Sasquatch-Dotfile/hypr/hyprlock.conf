# hyprlock.conf

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    brightness = 0.6
    vibrancy = 0.2
}

image {
    monitor =
    path = ~/.config/themes/wallpapers/avatar.png   # optionnel
    size = 80
    border_size = 2
    border_color = rgba(88aaeeee)
    rounding = -1   # cercle
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(cdd6f4ff)
    font_size = 72
    font_family = JetBrains Mono Bold
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A %d %B')"
    color = rgba(a6adc8cc)
    font_size = 18
    font_family = JetBrains Mono
    position = 0, -110
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    outer_color = rgba(88aaee44)
    inner_color = rgba(0f0f19cc)
    font_color = rgba(cdd6f4ff)
    fade_on_empty = true
    placeholder_text = <i>Mot de passe...</i>
    check_color = rgba(a6e3a1ff)
    fail_color = rgba(f38ba8ff)
    fail_text = <i>Raté ($ATTEMPTS)</i>
    rounding = 12
    position = 0, -180
    halign = center
    valign = center
}
