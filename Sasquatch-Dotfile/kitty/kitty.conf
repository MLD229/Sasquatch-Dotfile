# kitty/kitty.conf

# ── Police ───────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
font_size        12.0
adjust_line_height 110%

# ── Transparence / Fond ───────────────────────
background_opacity 0.88
blur_radius        12
dynamic_background_color yes

# ── Couleurs (Catppuccin Mocha) ───────────────
foreground            #cdd6f4
background            #0f0f19
selection_foreground  #0f0f19
selection_background  #88aaee

color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #88aaee
color5  #aa88ff
color6  #89dceb
color7  #bac2de
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #88aaee
color13 #aa88ff
color14 #89dceb
color15 #cdd6f4

cursor            #88aaee
cursor_text_color #0f0f19
cursor_shape      beam
cursor_blink_interval 0.5

# ── Fenêtre ───────────────────────────────────
window_padding_width    12
hide_window_decorations yes
remember_window_size    yes

# ── Tabs ─────────────────────────────────────
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #0f0f19
active_tab_background   #88aaee
inactive_tab_foreground #6c7086
inactive_tab_background #1e1e2e

# ── Divers ───────────────────────────────────
scrollback_lines        5000
enable_audio_bell       no
visual_bell_duration    0.0
confirm_os_window_close 0
shell                   fish
